services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hackathon_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hackathon_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: .
    command: uv run scripts/migrate.py up
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_NAME: hackathon_db
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
    profiles:
      - setup

  web:
    build: .
    command: >-
      uv run gunicorn
      -w 4
      -k gthread
      --threads 8
      -b 0.0.0.0:5000
      wsgi:app
      --timeout 60
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FLASK_DEBUG: "false"
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: "5000"
      DATABASE_NAME: hackathon_db
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      APP_BASE_URL: http://localhost
      REDIS_URL: redis://redis:6379/0
    expose:
      - "5000"
    deploy:
      replicas: 2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - promdata:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    depends_on:
      - prometheus
    restart: unless-stopped

  discord-relay:
    image: python:3.13-alpine
    command: python /app/discord_relay.py
    volumes:
      - ./monitoring/discord_relay.py:/app/discord_relay.py:ro
    environment:
      DISCORD_WEBHOOK: ${DISCORD_WEBHOOK_URL}
      DISCORD_ONCALL_ROLE_ID: "1490051693251919962"
    ports:
      - "9094:9094"
    restart: unless-stopped

  discord-bot:
    image: python:3.13-alpine
    command: sh -c "pip install --quiet discord.py && python /app/discord_bot.py"
    volumes:
      - ./monitoring/discord_bot.py:/app/discord_bot.py:ro
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_ALERT_CHANNEL_ID: ${DISCORD_ALERT_CHANNEL_ID}
      ALERTMANAGER_URL: http://alertmanager:9093
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-1490040458481762384}
      DISCORD_INCIDENT_CATEGORY_ID: ${DISCORD_INCIDENT_CATEGORY_ID:-1490097852096053418}
      DISCORD_ONCALL_ROLE_ID: ${DISCORD_ONCALL_ROLE_ID:-1490051693251919962}
      DISCORD_SENIOR_ROLE_ID: ${DISCORD_SENIOR_ROLE_ID:-1490081907839471908}
      DISCORD_LEAD_ROLE_ID: ${DISCORD_LEAD_ROLE_ID:-1490082322383376526}
    depends_on:
      - alertmanager
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  promdata:

