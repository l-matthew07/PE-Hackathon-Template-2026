services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hackathon_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d hackathon_db" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - monitoring
    label:
      autoheal-app: true

  redis:
    image: redis:7-alpine
    command: [ "redis-server", "--appendonly", "yes" ]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - monitoring
    label:
      autoheal-app: true

  migrate:
    build: .
    command: uv run scripts/migrate.py up
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_NAME: hackathon_db
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
    profiles:
      - setup
    networks:
      - monitoring

  web:
    build: .
    command: >-
      uv run gunicorn -w 4 -k gthread --threads 8 -b 0.0.0.0:5000 wsgi:app --timeout 60
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FLASK_DEBUG: "false"
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: "5000"
      DATABASE_NAME: hackathon_db
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      APP_BASE_URL: http://localhost
      REDIS_URL: redis://redis:6379/0
    expose:
      - "5000"
    deploy:
      replicas: 2
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monitoring
    label:
      autoheal-app: true

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - monitoring
    label:
      autoheal-app: true

  node_exporter:
    image: prom/node-exporter:v1.8.0
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    ports:
      - "9100:9100"
    networks:
      - monitoring

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    environment:
      DATA_SOURCE_NAME: "postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-postgres}@db:5432/${DATABASE_NAME:-hackathon_db}?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - db
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      web:
        condition: service_healthy
      node_exporter:
        condition: service_started
      postgres_exporter:
        condition: service_started
    restart: unless-stopped
    networks:
      - monitoring

  loki:
    image: grafana/loki:2.9.6
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3100/ready" ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - monitoring
  autoheal:
    deploy:
      replicas: 1
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal-app
    image: willfarrell/autoheal:latest
    network_mode: none
    restart: always
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock

  promtail:
    image: grafana/promtail:2.9.6
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/log/docker:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:10.4.2
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/admin/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/flask_overview.json
      GF_INSTALL_PLUGINS: "volkovlabs-echarts-panel,grafana-clock-panel,grafana-polystat-panel,marcusolsson-dynamictext-panel,grafana-piechart-panel"
      GF_PANELS_DISABLE_SANITIZE_HTML: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - monitoring

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - monitoring

  discord-relay:
    image: python:3.13-alpine
    command: python /app/discord_relay.py
    volumes:
      - ./monitoring/discord_relay.py:/app/discord_relay.py:ro
    environment:
      DISCORD_WEBHOOK: ${DISCORD_WEBHOOK_URL}
      DISCORD_ONCALL_ROLE_ID: "1490051693251919962"
    ports:
      - "9094:9094"
    restart: unless-stopped
    networks:
      - monitoring

  discord-bot:
    image: python:3.13-alpine
    command: sh -c "pip install --quiet discord.py && python /app/discord_bot.py"
    volumes:
      - ./monitoring/discord_bot.py:/app/discord_bot.py:ro
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_ALERT_CHANNEL_ID: ${DISCORD_ALERT_CHANNEL_ID}
      ALERTMANAGER_URL: http://alertmanager:9093
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-1490040458481762384}
      DISCORD_INCIDENT_CATEGORY_ID: ${DISCORD_INCIDENT_CATEGORY_ID:-1490097852096053418}
      DISCORD_ONCALL_ROLE_ID: ${DISCORD_ONCALL_ROLE_ID:-1490051693251919962}
      DISCORD_SENIOR_ROLE_ID: ${DISCORD_SENIOR_ROLE_ID:-1490081907839471908}
      DISCORD_LEAD_ROLE_ID: ${DISCORD_LEAD_ROLE_ID:-1490082322383376526}
    depends_on:
      - alertmanager
    restart: unless-stopped
    networks:
      - monitoring

networks:
  monitoring:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  prometheus_data:
  loki_data:
  grafana_data:
