global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: [alertmanager:9093]

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: flask-shortener
    static_configs:
      - targets: [web1:5000, web2:5000]
    metrics_path: /metrics
