events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream shortener_upstream {
        zone shortener_upstream 64k;
        least_conn;
        server web:5000 resolve;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;

        location /dashboard {
            set $grafana_upstream http://grafana:3000;
            proxy_pass $grafana_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 80;
            proxy_set_header X-Forwarded-Prefix /dashboard;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location = /prometheus {
            return 301 /prometheus/;
        }

        location /prometheus/ {
            rewrite ^/prometheus(/.*)$ $1 break;
            proxy_pass http://prometheus:9090;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port 80;
            proxy_set_header X-Forwarded-Prefix /prometheus;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect / /prometheus/;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location = / {
            try_files /index.html =404;
        }

        location = /index.html {
            try_files /index.html =404;
        }

        location = /api {
            return 301 /api/;
        }

        location /api/ {
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass http://shortener_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect / /api/;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
