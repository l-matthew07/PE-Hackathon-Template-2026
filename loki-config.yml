auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 168h
  # Keep very large noisy lines from bloating storage.
  max_line_size: 64KB
  max_line_size_truncate: true
  # Limit stream/cardinality and write pressure from unexpected log sources.
  max_global_streams_per_user: 3000
  per_stream_rate_limit: 2MB
  per_stream_rate_limit_burst: 8MB

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
