global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: flask_app
    static_configs:
      - targets: ["web:5000"]
    metrics_path: /metrics

  - job_name: node_exporter
    static_configs:
      - targets: ["node_exporter:9100"]

  - job_name: postgres_exporter
    static_configs:
      - targets: ["postgres_exporter:9187"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
