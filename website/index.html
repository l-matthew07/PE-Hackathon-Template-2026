<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wealways.online — URL Shortener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --white: #FFFBFC;
      --pink-50: #FFF7F8;
      --pink-100: #FFF0F3;
      --pink-200: #FFCCD5;
      --pink-300: #FFB3C1;
      --pink-400: #FF8FA3;
      --pink-500: #FF758F;
      --pink-600: #E05780;
      --accent: #C9184A;
      --accent-hover: #A4133C;
      --text: #2B2D42;
      --text-light: #8D99AE;
      --glass-bg: rgba(255, 251, 252, 0.72);
      --glass-border: rgba(255, 179, 193, 0.35);
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html { font-size: 16px; }

    body {
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      background: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Animated gradient background */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(
        135deg,
        var(--white) 0%,
        var(--pink-100) 30%,
        var(--pink-200) 55%,
        var(--pink-100) 75%,
        var(--white) 100%
      );
      background-size: 400% 400%;
      animation: gradientShift 14s ease infinite;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Grain overlay */
    .grain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      opacity: 0.3;
    }

    /* Floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 1;
      pointer-events: none;
      opacity: 0.5;
    }

    .orb-1 {
      width: 500px;
      height: 500px;
      background: var(--pink-300);
      top: -120px;
      right: -100px;
    }

    .orb-2 {
      width: 350px;
      height: 350px;
      background: var(--pink-200);
      bottom: -80px;
      left: -60px;
    }

    .orb-3 {
      width: 250px;
      height: 250px;
      background: var(--pink-400);
      top: 50%;
      left: 60%;
      opacity: 0.25;
    }

    /* Main content */
    .container {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* Header / Brand */
    .brand {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeInUp 0.8s ease-out both;
    }

    .brand h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: clamp(3rem, 8vw, 5.5rem);
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--text);
    }

    .brand h1 span {
      font-style: italic;
      color: var(--accent);
    }

    .brand p {
      margin-top: 0.75rem;
      font-size: 1.125rem;
      color: var(--text-light);
      font-weight: 400;
      letter-spacing: 0.04em;
    }

    /* Glass card */
    .card {
      width: 100%;
      max-width: 600px;
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow:
        0 4px 24px rgba(201, 24, 74, 0.06),
        0 1px 3px rgba(0, 0, 0, 0.04);
      animation: fadeInUp 0.8s ease-out 0.15s both;
    }

    /* Input group */
    .input-group {
      display: flex;
      gap: 0.75rem;
      align-items: stretch;
    }

    .input-wrapper {
      flex: 1;
      position: relative;
    }

    .input-wrapper input {
      width: 100%;
      padding: 1rem 1.25rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: var(--text);
      background: var(--white);
      border: 1.5px solid var(--pink-200);
      border-radius: 14px;
      outline: none;
      transition: all 0.3s ease;
    }

    .input-wrapper input::placeholder {
      color: var(--text-light);
    }

    .input-wrapper input:focus {
      border-color: var(--pink-400);
      box-shadow: 0 0 0 4px rgba(255, 143, 163, 0.15);
    }

    .btn-shorten {
      padding: 1rem 2rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--white);
      background: var(--accent);
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.25s ease;
      white-space: nowrap;
      position: relative;
      overflow: hidden;
    }

    .btn-shorten:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(201, 24, 74, 0.25);
    }

    .btn-shorten:active {
      transform: translateY(0) scale(0.98);
    }

    .btn-shorten:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Result area */
    .result {
      margin-top: 1.5rem;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .result.show {
      max-height: 200px;
      opacity: 1;
    }

    .result-inner {
      background: var(--pink-50);
      border: 1px solid var(--pink-200);
      border-radius: 14px;
      padding: 1.125rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .result-url {
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      color: var(--accent);
      word-break: break-all;
      min-width: 0;
    }

    .btn-copy {
      padding: 0.6rem 1.2rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--accent);
      background: var(--white);
      border: 1.5px solid var(--pink-300);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-copy:hover {
      background: var(--pink-100);
      border-color: var(--accent);
    }

    .btn-copy.copied {
      background: var(--accent);
      color: var(--white);
      border-color: var(--accent);
    }

    /* Error message */
    .error {
      margin-top: 1rem;
      padding: 0.875rem 1.25rem;
      background: #FFF0F0;
      border: 1px solid #FFCCC7;
      border-radius: 12px;
      color: #C9184A;
      font-size: 0.9rem;
      display: none;
    }

    .error.show {
      display: block;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    /* Footer */
    .footer {
      margin-top: 3rem;
      text-align: center;
      animation: fadeInUp 0.8s ease-out 0.3s both;
    }

    .footer p {
      font-size: 0.85rem;
      color: var(--text-light);
      letter-spacing: 0.03em;
    }

    .footer a {
      color: var(--pink-500);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .footer a:hover {
      color: var(--accent);
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive */
    @media (max-width: 640px) {
      .card { padding: 1.75rem; }
      .input-group {
        flex-direction: column;
      }
      .btn-shorten {
        padding: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <!-- Background layers -->
  <div class="bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Grain texture -->
  <svg class="grain" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" viewBox="0 0 1 1">
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
    <rect x="0" y="0" width="1" height="1" filter="url(#grain)"/>
  </svg>

  <!-- Content -->
  <div class="container">
    <div class="brand">
      <h1>wealways<span>.online</span></h1>
      <p>For the MLH Production Engineering Hackathon</p>
    </div>

    <div class="card">
      <form id="shorten-form">
        <div class="input-group">
          <div class="input-wrapper">
            <input
              type="url"
              id="url-input"
              placeholder="Paste your long URL here…"
              autocomplete="off"
              required
            >
          </div>
          <button type="submit" class="btn-shorten" id="btn-shorten">
            Shorten
          </button>
        </div>
      </form>

      <div class="error" id="error"></div>

      <div class="result" id="result">
        <div class="result-inner">
          <span class="result-url" id="result-url"></span>
          <button class="btn-copy" id="btn-copy">Copy</button>
        </div>
      </div>
    </div>

    <div class="footer">
      <p>Crafted with care &mdash; <a href="#">wealways.online</a></p>
    </div>
  </div>

  <script>
    const form = document.getElementById('shorten-form');
    const input = document.getElementById('url-input');
    const btn = document.getElementById('btn-shorten');
    const resultEl = document.getElementById('result');
    const resultUrl = document.getElementById('result-url');
    const btnCopy = document.getElementById('btn-copy');
    const errorEl = document.getElementById('error');

    const API_BASE = window.location.origin;
    const API_PREFIX = `${API_BASE}/api`;

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const url = input.value.trim();
      if (!url) return;

      // Reset state
      errorEl.classList.remove('show');
      resultEl.classList.remove('show');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      try {
        const res = await fetch(`${API_PREFIX}/urls`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ original_url: url }),
        });

        if (!res.ok) {
          const data = await res.json().catch(() => null);
          throw new Error(data?.message || `Request failed (${res.status})`);
        }

        const data = await res.json();
        const shortUrl = `${API_BASE}/${data.short_code}`;

        resultUrl.textContent = shortUrl;
        resultEl.classList.add('show');
        btnCopy.textContent = 'Copy';
        btnCopy.classList.remove('copied');
      } catch (err) {
        errorEl.textContent = err.message || 'Something went wrong. Please try again.';
        errorEl.classList.add('show');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Shorten';
      }
    });

    btnCopy.addEventListener('click', async () => {
      const text = resultUrl.textContent;
      try {
        await navigator.clipboard.writeText(text);
        btnCopy.textContent = 'Copied!';
        btnCopy.classList.add('copied');
        setTimeout(() => {
          btnCopy.textContent = 'Copy';
          btnCopy.classList.remove('copied');
        }, 2000);
      } catch {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btnCopy.textContent = 'Copied!';
        btnCopy.classList.add('copied');
        setTimeout(() => {
          btnCopy.textContent = 'Copy';
          btnCopy.classList.remove('copied');
        }, 2000);
      }
    });
  </script>
</body>
</html>
