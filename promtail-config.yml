server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/log/docker/*/*.log

    pipeline_stages:
      # Docker JSON log wrapper
      - docker: {}

      # Try to parse the log line as JSON (structured logs from Flask)
      - json:
          expressions:
            level: level
            component: component
            request_id: request_id
            message: message

      # Promote parsed fields to labels for filtering
      - labels:
          level:
          component:

      # Use the message field as the log line if present
      - output:
          source: message
